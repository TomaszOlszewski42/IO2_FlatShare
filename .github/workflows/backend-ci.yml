name: Backend CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/backend/FlatShareBackend.slnx

    - name: Build
      run: dotnet build src/backend/FlatShareBackend.slnx --configuration Release --no-restore

    - name: Run tests
      run: dotnet test src/backend/FlatShareBackend.slnx --configuration Release --no-build