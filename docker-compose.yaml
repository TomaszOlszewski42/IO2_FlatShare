services:
  backend:
    build:
      context: ./src/backend         # Wchodzimy do folderu z solucją
      dockerfile: FlatShareBackend/Dockerfile # Ścieżka względem 'context'
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  database:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: WSzczebrzeszynieChrzaszczBrzmiWTrzcinie
      POSTGRES_DB: FlatShareDB
    ports:
      - "8001:5432" # Pierwszy port to port po stronie hosta, drugi to port, z którym chcemy się łączyć z poziomu innych zkonteneryzowanych aplikacji
    volumes:
      - database-data:/var/lib/postgres/data 
    restart: always

volumes:
  database-data: